inputs:
  FETCH_REF:
    description: '需要拉取的代码分支或commit_sha'
    required: true
    type: string
  SRC_REF:
    description: '需要合入的代码分支'
    required: true
    type: string

runs:
  using: "composite"
  steps:        
    - shell: bash
      run: |
        rm -rf work || true
        mkdir -p work
        cd work
        REPO="${{ github.repositoryUrl	}}" bash ../src/git-fetch-in-dir.sh "${{ inputs.FETCH_REF }}" "${{ inputs.SRC_REF }}"
        bash ../check-aptch/check-aptch.sh
        